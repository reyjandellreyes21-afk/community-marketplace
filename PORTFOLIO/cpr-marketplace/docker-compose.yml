version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cpr_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cpr_marketplace
      JWT_SECRET: change-me
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    depends_on:
      - backend

volumes:
  postgres_data:

